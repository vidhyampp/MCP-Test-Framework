[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    unit: hermetic tests with no browser, network, MCP server, or API key dependency
    mcp: tests that exercise an MCP server directly
    ui: tests that drive a browser UI via Playwright
    ai: tests that exercise or depend on AI-assisted modules
    smoke: fast sanity checks
    slow: long-running tests
addopts = --html=reports/report.html --self-contained-html
